<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
    <title>e-commerce</title>
</head>
<body>
    <header>
        <a class="nome" href="index.html"><span>PIM</span>STORE</a>
        <div class="pesquisar">
            <input type="search" id="barra" placeholder="Busca de produtos">
            <a href="#" id="btn-busca"><i class="fa-solid fa-magnifying-glass icone-busca"></i></a>
        </div>
        <div class="icones">
            <a href="login.html"><i class="fa-solid fa-user"></i></a>
            <a href="#" id="btn-carrinho"><i class="fa-solid fa-cart-shopping"></i></a>
            <a href="favoritos.html"><i class="fa-solid fa-heart"></i></a>
        </div>
    </header>

    <main>
        <h1>Produtos em destaque</h1>
        <div class="produtos">
            <div class="produto">
                <i class="fa-solid fa-heart favorito" ></i>
                <img src="imagens/Logitech-lanca-teclado-mecanico-Pro-X-60-no-Brasil-912x569.webp" alt="Teclado mecânico">
                <div class="info">
                    <p class="nome-produto">Teclado mecânico</p>
                    <p><span class="preco">R$ 359,99</span></p>
                    <button class="Adicionar">Adicionar ao carrinho</button>
                </div>
            </div>
            <div class="produto">
                <i class="fa-solid fa-heart favorito" ></i>
                <img src="imagens/optical-vs-laser-mouse-for-gaming-hero.avif" alt="Mouse">
                <div class="info">
                    <p class="nome-produto">Mouse</p>
                    <p><span class="preco">R$ 220,50</span></p>
                    <button class="Adicionar">Adicionar ao carrinho</button>
                </div>
            </div>
            <div class="produto">
                <i class="fa-solid fa-heart favorito" ></i>
                <img src="imagens/8045f5b9-ba9a-4595-b44f-6b0f32b8c95d.jpg" alt="Headset">
                <div class="info">
                    <p class="nome-produto">Headset</p>
                    <p><span class="preco">R$ 360,90</span></p>
                    <button class="Adicionar">Adicionar ao carrinho</button>
                </div>
            </div>
        </div>

        <p id="nenhum-resultado" style="display: none; color: white; text-align: center;">
            Nenhum produto encontrado
        <p>
    </main>

    <aside class="carrinho">
        <div class="topo">
            <h2>Carrinho de Compras</h2>
            <span class="fechar">X</span>
        </div>

        <div class="carrinho-vazio">
            <p><span style="color: black;">Seu carrinho está vazio.</span></p>
            <a href="index.html" class="btn-voltar">Ver produtos</a>
        </div>

        <div class="itens">
         
        </div>

        <div class="total">
            
        </div>

        <div class="rodape">
            <div class="total">
                <span class="valor">Total: </span>
                <span class="valor-total">R$ 0,00</span>
            </div>
            <button class="finalizar">Finalizar Compra</button>
        </div>
    </aside>

    <footer>
        <a class="info-footer" href="#">Sobre</a>
        <a class="info-footer" href="#">Contato</a>
        <a class="info-footer" href="#">Politica de Privacidade</a>
    </footer>
    <script src="script.js"></script>
</body>

</html>
