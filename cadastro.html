<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/cadastro.css">
    <title>Cadastro</title>
</head>
<body>
    <header>
        <a class="nome" href="index.html"><span>PIM</span>STORE</a>
        <div class="pesquisar">
            <input type="search" id="barra" placeholder="Busca de produtos">
            <a href="#" id="btn-busca"><i class="fa-solid fa-magnifying-glass icone-busca"></i></a>
        </div>
        <div class="icones">
            <a href="login.html"><i class="fa-solid fa-user"></i></a>
            <a href="#" id="btn-carrinho"><i class="fa-solid fa-cart-shopping"></i></a>
            <a href="favoritos.html"><i class="fa-solid fa-heart"></i></a>
        </div>
    </header>

    <form class="cadastro">
        <h2>Cadastre-se</h2>

        <div class="campo">
            <input type="email" id="email" placeholder="Email" required maxlength="30">
        </div>

        <div  class="campo">
            <input type="password" id="senha" placeholder="Senha" required minlength="8" maxlength="15">
        </div>

        <div class="campo">
            <input type="password" id="confirmarSenha" placeholder="Confirmar senha" required minlength="8" maxlength="15">
        </div>

        <input type="submit" class="cadastrar" value="Cadastrar">

        <p id="erro-senha">
            As senhas não coincidem
        </p>
    </form>

<!--Script para confirmar senhas iguais-->
<script>
const form = document.querySelector(".cadastro");
const erro = document.querySelector("#erro-senha");

erro.style.display ="none";

form.addEventListener("submit", function(e) {
    const senha = document.querySelector("#senha").value;
    const confirmar = document.querySelector("#confirmarSenha").value;

    if (senha !== confirmar) {
        e.preventDefault();
        erro.style.display= "block";
    } else {
        erro.style.display = "none";
    }
});
</script>
</body>
</html>
