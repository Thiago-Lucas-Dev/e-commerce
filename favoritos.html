<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Favoritos | PIMSTORE</title>
</head>
<body class="pagina-favoritos">
    <header>
        <a class="nome" href="index.html"><span>PIM</span>STORE</a>

        <div class="pesquisar">
            <input type="search" id="barra" placeholder="Busca de produtos">
            <button id="btn-busca" aria-label="Buscar"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="icones">
            <a href="login.html" aria-label="Login"><i class="fa-solid fa-user"></i></a>
            <a href="#" id="btn-carrinho" aria-label="Carrinho"><i class="fa-solid fa-cart-shopping"></i></a>
            <a href="favoritos.html" class="icone-favoritos ativo" aria-label="Favoritos">
                <i class="fa-solid fa-heart"></i>
                <span class="badge-favoritos">6</span>
            </a>
        </div>
    </header>

    <main class="favoritos-main">
        <section class="topo-favoritos">
            <div class="titulo-area">
                <h1>Seus favoritos</h1>
                <p>Aqui estão os produtos que você salvou.</p>
            </div>
        </section>

        <section class="linha-info">
            <p class="quantidade">6 produtos</p>
            <select class="ordenacao" id="ordenacao">
                <option value="recentes">Mais recentes</option>
                <option value="menor-preco">Menor preço</option>
                <option value="maior-preco">Maior preço</option>
                <option value="nome">Nome</option>
            </select>
        </section>

        <section class="produtos favoritos-grid" id="listaFavoritos"></section>

        <div class="acoes-baixo">
            <button class="limpar" id="limparFavoritos">
                <i class="fa-regular fa-trash-can"></i>
                Limpar todos os favoritos
            </button>
        </div>

    </main>

    <aside class="carrinho" id="painelCarrinho">
            <div class="topo">
                <h2>Carrinho de Compras</h2>
                <button class="fechar" aria-label="Fechar carrinho">×</button>
            </div>
            <div class="itens"></div>
            <div class="carrinho-vazio">
                <p>Seu carrinho está vazio.</p>
                <a href="index.html" class="btn-voltar">Ver produtos</a>
            </div>
            <div class="rodape">
                <div class="total"><span>Total: </span><span class="valor-total">R$ 0,00</span></div>
                <button class="finalizar">Finalizar Compra</button>
            </div>
    </aside>
    <script src="script.js"></script>
</body>
</html>
